name: Build All GentooHA Targets

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'overlay/**'
      - 'build.sh'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      flavor:
        description: "Flavor to build (or 'all')"
        required: false
        default: all
        type: choice
        options: [all, live, installer, debug]
        publish_release:
          description: "Publish build artifacts to a GitHub Release"
          required: false
          default: false
          type: boolean

permissions:
        contents: write
  actions: write

jobs:
  matrix:
    name: "Build ${{ matrix.platform }}-${{ matrix.flavor }}"
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, pi3, pi4, pizero2, bbb, pbv2]
        flavor: ${{ fromJSON(inputs.flavor == 'live' && '["live"]' || inputs.flavor == 'installer' && '["installer"]' || inputs.flavor == 'debug' && '["debug"]' || '["live","installer","debug"]') }}
    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      flavor:   ${{ matrix.flavor }}
      start_stage: "1"
      clean_state: "false"
    secrets: inherit

  release:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs: matrix
    if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release) }}
    steps:
      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gentooha-*
          path: /tmp/release-assets
          merge-multiple: true

      - name: Download binpkg bundles
        uses: actions/download-artifact@v4
        with:
          pattern: gentooha-binpkgs-*
          path: /tmp/release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('build-{0}', github.run_number) }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('GentooHA build {0}', github.run_number) }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          generate_release_notes: true
          files: |
            /tmp/release-assets/gentooha-*.iso
            /tmp/release-assets/gentooha-*.img
            /tmp/release-assets/gentooha-*.vdi
            /tmp/release-assets/gentooha-*.vhd
            /tmp/release-assets/gentooha-*.manifest.txt
            /tmp/release-assets/binpkgs-*.tar.gz
