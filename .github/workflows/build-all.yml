name: Build All GentooHA Targets

on:
  push:
    branches: [main]
    tags:
      - 'v*'
      - 'release-*'
    paths:
      - 'scripts/**'
      - 'overlay/**'
      - 'build.sh'
      - 'pipeline_targets.txt'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      flavor:
        description: "Flavor to build (or 'all')"
        required: false
        default: all
        type: choice
        options: [all, live, debug, installer]
      x64_artifact_formats:
        description: "X64 artifact formats to build (space/comma separated)"
        required: false
        default: "iso img"
        type: string
      publish_release:
        description: "Publish build artifacts to a GitHub Release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: write

jobs:
  resolve-matrix:
    name: Resolve build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve matrix from root target file
        id: resolve
        shell: bash
        env:
          FLAVOR_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.flavor || 'all' }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          from pathlib import Path

          platforms = ["x64", "pi3", "pi4", "pizero2", "bbb", "pbv2"]
          flavor_input = os.environ.get("FLAVOR_INPUT", "all")

          if flavor_input == "live":
              default_flavors = ["live"]
          elif flavor_input == "debug":
              default_flavors = ["debug"]
          elif flavor_input == "installer":
              default_flavors = ["live"]
          else:
              default_flavors = ["live", "debug"]

          default_targets = [
              {"platform": platform, "flavor": flavor}
              for platform in platforms
              for flavor in default_flavors
          ]

          target_file = Path("pipeline_targets.txt")
          raw_text = target_file.read_text(encoding="utf-8") if target_file.exists() else ""
          cleaned_parts = []
          for line in raw_text.splitlines():
              cleaned_line = line.split("#", 1)[0].strip()
              if cleaned_line:
                  cleaned_parts.append(cleaned_line)
          cleaned_text = ",".join(cleaned_parts)
          tokens = [token.strip() for token in cleaned_text.split(",") if token.strip()]

          if not tokens:
              matrix = {"include": default_targets}
              print(f"matrix={json.dumps(matrix, separators=(',', ':'))}")
              raise SystemExit(0)

          allowed = {(item["platform"], item["flavor"]) for item in default_targets}
          selected = []
          seen = set()
          invalid = []

          for token in tokens:
              if token in platforms:
                  expanded = [(token, flavor) for flavor in default_flavors]
              elif "-" in token:
                  platform, flavor = token.rsplit("-", 1)
                  expanded = [(platform, flavor)]
              else:
                  invalid.append(token)
                  continue

              for entry in expanded:
                  if entry not in allowed:
                      invalid.append(token)
                      continue
                  if entry in seen:
                      continue
                  seen.add(entry)
                  selected.append({"platform": entry[0], "flavor": entry[1]})

          if invalid:
              raise SystemExit(
                  "Invalid entries in pipeline_targets.txt: "
                  + ", ".join(sorted(set(invalid)))
              )

          matrix = {"include": selected}
          print(f"matrix={json.dumps(matrix, separators=(',', ':'))}")
          PY

  matrix:
    needs: resolve-matrix
    name: "Build ${{ matrix.platform }}-${{ matrix.flavor }}"
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-matrix.outputs.matrix) }}
    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      flavor:   ${{ matrix.flavor }}
      start_stage: "1"
      reuse_previous_artifacts: false
      reuse_binpkg_bundle: false
      reuse_source_run_id: ""
      x64_artifact_formats: ${{ matrix.platform != 'x64' && 'img' || (matrix.flavor == 'debug' && 'vdi img' || (github.event_name == 'workflow_dispatch' && inputs.x64_artifact_formats || 'iso img')) }}
    secrets: inherit

  release:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs: [resolve-matrix, matrix]
    if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release) }}
    steps:
      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gentooha-*
          path: /tmp/release-assets
          merge-multiple: true

      - name: Download binpkg bundles
        uses: actions/download-artifact@v4
        with:
          pattern: gentooha-binpkgs-*
          path: /tmp/release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('build-{0}', github.run_number) }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('GentooHA build {0}', github.run_number) }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          generate_release_notes: true
          files: |
            /tmp/release-assets/gentooha-*.iso
            /tmp/release-assets/gentooha-*.img
            /tmp/release-assets/gentooha-*.vdi
            /tmp/release-assets/gentooha-*.vhd
            /tmp/release-assets/gentooha-*.manifest.txt
            /tmp/release-assets/binpkgs-*.tar.gz
            /tmp/release-assets/gentooha-binhost-*.tar.zst
