# GentooHA build pipeline — produces a .iso (x64) or .img (ARM) artifact.
#
# The build is split into ten sequential jobs, one per build stage:
#
#  stage1  – host prerequisites & TARGET_ROOT skeleton              ~5 min
#  stage2  – Gentoo stage3 tarball download + extraction            ~20 min
#  stage3  – portage sync + @world update + locale/profile          ~2-3 h
#  stage4  – container runtime (Docker) + HA host deps              ~1 h
#  stage5  – HA Supervisor compatibility identity layer             ~5 min
#  stage6  – dual kernel build (compat + modern track, ccache)      ~4-6 h
#  stage7  – bootloader (GRUB) configuration                        ~15 min
#  stage8  – HA Supervised installer + os-agent files               ~15 min
#  stage9  – AppArmor userspace tools                               ~30 min
#  stage10 – final artifact generation (.iso / .img)                ~30 min
#  cleanup – delete intermediate rootfs artifacts (keeps final only)
#
# Artifact strategy
# ─────────────────
# Every stage (1-9) packs the Gentoo chroot into a rootfs tarball and uploads
# it as "rootfs-{platform}-{flavor}-stageN".  A sidecar rootfs_meta.txt records
# COMPLETED_STAGE=N so any consumer can verify the artifact without unpacking.
#
# run_all.sh reads the completed_stage marker embedded in the unpacked rootfs
# and automatically skips stages already finished — so a re-run of any job
# always picks up exactly where it left off with no manual START_STAGE tuning.
#
# The kernel job (stage6) uses "if: always()" for its pack/upload steps so
# a timed-out run still saves progress (including kernel .o files + ccache).
#
# Once stage10 succeeds and the final .iso/.img is uploaded, the cleanup job
# removes all intermediate rootfs-* artifacts to reclaim storage space.

name: Build GentooHA

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        default: x64
        type: choice
        options: [x64, pi3, pi4, pizero2, bbb, pbv2]
      flavor:
        description: "Build flavor"
        required: true
        default: live
        type: choice
        options: [live, installer]

  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      flavor:
        required: true
        type: string

# Minimal token permissions — checkout (read) and artifact upload/download (write).
permissions:
  contents: read
  actions: write

# ── Shared environment ────────────────────────────────────────────────────────
env:
  PLATFORM:      ${{ inputs.platform }}
  FLAVOR:        ${{ inputs.flavor }}
  TARGET_ROOT:   /mnt/gentoo
  # STATE_ROOT inside TARGET_ROOT so checkpoint files survive pack/unpack.
  STATE_ROOT:    /mnt/gentoo/.ha-build-state
  ARTIFACT_DIR:  /mnt/gentoo-artifacts
  # ROOTFS_PATH is the single authoritative location used by rootfs_pack.sh and
  # rootfs_unpack.sh.  Changing it here is the only place required.
  ROOTFS_PATH:   /tmp/rootfs.tar.zst

jobs:
  # ── Stage 1: host prerequisites & TARGET_ROOT skeleton ───────────────────
  stage1:
    name: "[1/10] stage1 ${{ inputs.platform }}-${{ inputs.flavor }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install host prerequisites
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q debootstrap gdisk parted wget curl git rsync xz-utils tar zstd

      - name: Prepare mount point
        run: sudo mkdir -p /mnt/gentoo

      - name: Run stage 1
        env:
          END_STAGE: "1"
        run: sudo -E bash build.sh --non-interactive

      - name: Pack rootfs
        run: sudo -E bash scripts/gentoo/rootfs_pack.sh "${{ env.ROOTFS_PATH }}"

      - name: Upload rootfs artifact (stage 1)
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage1
          path: |
            ${{ env.ROOTFS_PATH }}
            /tmp/rootfs_meta.txt
          retention-days: 1
          if-no-files-found: error

  # ── Stage 2: Gentoo stage3 tarball download + extraction ─────────────────
  stage2:
    name: "[2/10] stage2 ${{ inputs.platform }}-${{ inputs.flavor }}"
    needs: [stage1]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download stage-1 rootfs
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage1
          path: /tmp

      - name: Install host prerequisites
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q zstd wget curl tar

      - name: Unpack rootfs
        run: sudo -E bash scripts/gentoo/rootfs_unpack.sh "${{ env.ROOTFS_PATH }}"

      - name: Run stage 2
        env:
          END_STAGE: "2"
        run: sudo -E bash build.sh --non-interactive

      - name: Pack rootfs
        run: sudo -E bash scripts/gentoo/rootfs_pack.sh "${{ env.ROOTFS_PATH }}"

      - name: Upload rootfs artifact (stage 2)
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage2
          path: |
            ${{ env.ROOTFS_PATH }}
            /tmp/rootfs_meta.txt
          retention-days: 1
          if-no-files-found: error

  # ── Stage 3: portage sync + @world update + locale/profile ───────────────
  stage3:
    name: "[3/10] stage3 ${{ inputs.platform }}-${{ inputs.flavor }}"
    needs: [stage2]
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download stage-2 rootfs
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage2
          path: /tmp

      - name: Install host prerequisites
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q zstd rsync
          if [[ "${{ inputs.platform }}" != "x64" ]]; then
            sudo apt-get install -y -q qemu-user-static binfmt-support
            sudo update-binfmts --enable qemu-arm    || true
            sudo update-binfmts --enable qemu-aarch64 || true
          fi

      - name: Unpack rootfs
        run: sudo -E bash scripts/gentoo/rootfs_unpack.sh "${{ env.ROOTFS_PATH }}"

      - name: Run stage 3
        env:
          END_STAGE: "3"
        run: sudo -E bash build.sh --non-interactive

      - name: Pack rootfs
        run: sudo -E bash scripts/gentoo/rootfs_pack.sh "${{ env.ROOTFS_PATH }}"

      - name: Upload rootfs artifact (stage 3)
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage3
          path: |
            ${{ env.ROOTFS_PATH }}
            /tmp/rootfs_meta.txt
          retention-days: 1
          if-no-files-found: error

  # ── Stage 4: container runtime (Docker) + HA host dependencies ───────────
  stage4:
    name: "[4/10] stage4 ${{ inputs.platform }}-${{ inputs.flavor }}"
    needs: [stage3]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download stage-3 rootfs
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage3
          path: /tmp

      - name: Install host prerequisites
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q zstd rsync
          if [[ "${{ inputs.platform }}" != "x64" ]]; then
            sudo apt-get install -y -q qemu-user-static binfmt-support
            sudo update-binfmts --enable qemu-arm    || true
            sudo update-binfmts --enable qemu-aarch64 || true
          fi

      - name: Unpack rootfs
        run: sudo -E bash scripts/gentoo/rootfs_unpack.sh "${{ env.ROOTFS_PATH }}"

      - name: Run stage 4
        env:
          END_STAGE: "4"
        run: sudo -E bash build.sh --non-interactive

      - name: Pack rootfs
        run: sudo -E bash scripts/gentoo/rootfs_pack.sh "${{ env.ROOTFS_PATH }}"

      - name: Upload rootfs artifact (stage 4)
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage4
          path: |
            ${{ env.ROOTFS_PATH }}
            /tmp/rootfs_meta.txt
          retention-days: 1
          if-no-files-found: error

  # ── Stage 5: HA Supervisor compatibility identity layer ───────────────────
  stage5:
    name: "[5/10] stage5 ${{ inputs.platform }}-${{ inputs.flavor }}"
    needs: [stage4]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download stage-4 rootfs
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage4
          path: /tmp

      - name: Install host prerequisites
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q zstd rsync
          if [[ "${{ inputs.platform }}" != "x64" ]]; then
            sudo apt-get install -y -q qemu-user-static binfmt-support
            sudo update-binfmts --enable qemu-arm    || true
            sudo update-binfmts --enable qemu-aarch64 || true
          fi

      - name: Unpack rootfs
        run: sudo -E bash scripts/gentoo/rootfs_unpack.sh "${{ env.ROOTFS_PATH }}"

      - name: Run stage 5
        env:
          END_STAGE: "5"
        run: sudo -E bash build.sh --non-interactive

      - name: Pack rootfs
        run: sudo -E bash scripts/gentoo/rootfs_pack.sh "${{ env.ROOTFS_PATH }}"

      - name: Upload rootfs artifact (stage 5)
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage5
          path: |
            ${{ env.ROOTFS_PATH }}
            /tmp/rootfs_meta.txt
          retention-days: 1
          if-no-files-found: error

  # ── Stage 6: dual kernel build (compat + modern, ccache) ─────────────────
  # Longest job (~4-6 h).  Pack/upload use "if: always()" so a timed-out run
  # still saves the partial kernel sources + ccache + checkpoint files, and
  # "Re-run failed jobs" continues from the last sub-step checkpoint.
  stage6:
    name: "[6/10] stage6 ${{ inputs.platform }}-${{ inputs.flavor }}"
    needs: [stage5]
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download stage-5 rootfs
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage5
          path: /tmp

      - name: Install host prerequisites
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q zstd ccache
          if [[ "${{ inputs.platform }}" != "x64" ]]; then
            sudo apt-get install -y -q qemu-user-static binfmt-support \
              gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf \
              gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
            sudo update-binfmts --enable qemu-arm    || true
            sudo update-binfmts --enable qemu-aarch64 || true
          fi

      - name: Restore ccache (speeds up re-compilation on re-runs)
        uses: actions/cache@v4
        with:
          path: /tmp/ha-ccache-${{ inputs.platform }}
          key: kernel-ccache-${{ inputs.platform }}-${{ hashFiles('scripts/gentoo/stage6.sh', 'scripts/gentoo/common.sh') }}
          restore-keys: |
            kernel-ccache-${{ inputs.platform }}-

      - name: Unpack rootfs
        run: sudo -E bash scripts/gentoo/rootfs_unpack.sh "${{ env.ROOTFS_PATH }}"

      - name: Run stage 6
        env:
          END_STAGE: "6"
          CCACHE_HOST_DIR: /tmp/ha-ccache-${{ inputs.platform }}
        run: sudo -E bash build.sh --non-interactive

      # Keep kernel .o files so a re-run of this job can resume compilation.
      - name: Pack rootfs (always — preserves kernel build state for re-run)
        if: always()
        run: sudo -E bash scripts/gentoo/rootfs_pack.sh "${{ env.ROOTFS_PATH }}" --no-clean-src

      - name: Upload rootfs artifact (stage 6, always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage6
          path: |
            ${{ env.ROOTFS_PATH }}
            /tmp/rootfs_meta.txt
          retention-days: 1
          overwrite: true
          if-no-files-found: error

  # ── Stage 7: bootloader (GRUB) configuration ─────────────────────────────
  stage7:
    name: "[7/10] stage7 ${{ inputs.platform }}-${{ inputs.flavor }}"
    needs: [stage6]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download stage-6 rootfs
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage6
          path: /tmp

      - name: Install host prerequisites
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q zstd rsync
          if [[ "${{ inputs.platform }}" != "x64" ]]; then
            sudo apt-get install -y -q qemu-user-static binfmt-support
            sudo update-binfmts --enable qemu-arm    || true
            sudo update-binfmts --enable qemu-aarch64 || true
          fi

      - name: Unpack rootfs
        run: sudo -E bash scripts/gentoo/rootfs_unpack.sh "${{ env.ROOTFS_PATH }}"

      - name: Run stage 7
        env:
          END_STAGE: "7"
        run: sudo -E bash build.sh --non-interactive

      - name: Pack rootfs
        run: sudo -E bash scripts/gentoo/rootfs_pack.sh "${{ env.ROOTFS_PATH }}"

      - name: Upload rootfs artifact (stage 7)
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage7
          path: |
            ${{ env.ROOTFS_PATH }}
            /tmp/rootfs_meta.txt
          retention-days: 1
          if-no-files-found: error

  # ── Stage 8: HA Supervised installer + os-agent files ────────────────────
  stage8:
    name: "[8/10] stage8 ${{ inputs.platform }}-${{ inputs.flavor }}"
    needs: [stage7]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download stage-7 rootfs
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage7
          path: /tmp

      - name: Install host prerequisites
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q zstd curl jq rsync dpkg

      - name: Unpack rootfs
        run: sudo -E bash scripts/gentoo/rootfs_unpack.sh "${{ env.ROOTFS_PATH }}"

      - name: Run stage 8
        env:
          END_STAGE: "8"
        run: sudo -E bash build.sh --non-interactive

      - name: Pack rootfs
        run: sudo -E bash scripts/gentoo/rootfs_pack.sh "${{ env.ROOTFS_PATH }}"

      - name: Upload rootfs artifact (stage 8)
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage8
          path: |
            ${{ env.ROOTFS_PATH }}
            /tmp/rootfs_meta.txt
          retention-days: 1
          if-no-files-found: error

  # ── Stage 9: AppArmor userspace tools ────────────────────────────────────
  stage9:
    name: "[9/10] stage9 ${{ inputs.platform }}-${{ inputs.flavor }}"
    needs: [stage8]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download stage-8 rootfs
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage8
          path: /tmp

      - name: Install host prerequisites
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q zstd rsync
          if [[ "${{ inputs.platform }}" != "x64" ]]; then
            sudo apt-get install -y -q qemu-user-static binfmt-support
            sudo update-binfmts --enable qemu-arm    || true
            sudo update-binfmts --enable qemu-aarch64 || true
          fi

      - name: Unpack rootfs
        run: sudo -E bash scripts/gentoo/rootfs_unpack.sh "${{ env.ROOTFS_PATH }}"

      - name: Run stage 9
        env:
          END_STAGE: "9"
        run: sudo -E bash build.sh --non-interactive

      - name: Pack rootfs
        run: sudo -E bash scripts/gentoo/rootfs_pack.sh "${{ env.ROOTFS_PATH }}"

      - name: Upload rootfs artifact (stage 9)
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage9
          path: |
            ${{ env.ROOTFS_PATH }}
            /tmp/rootfs_meta.txt
          retention-days: 1
          if-no-files-found: error

  # ── Stage 10: final artifact generation (.iso / .img) ────────────────────
  stage10:
    name: "[10/10] stage10 ${{ inputs.platform }}-${{ inputs.flavor }}"
    needs: [stage9]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download stage-9 rootfs
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage9
          path: /tmp

      - name: Install host prerequisites
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            zstd xorriso grub-pc-bin grub-efi-amd64-bin mtools squashfs-tools \
            dosfstools parted kpartx rsync
          if [[ "${{ inputs.platform }}" != "x64" ]]; then
            sudo apt-get install -y -q qemu-user-static binfmt-support
            sudo update-binfmts --enable qemu-arm    || true
            sudo update-binfmts --enable qemu-aarch64 || true
          fi

      - name: Unpack rootfs
        run: sudo -E bash scripts/gentoo/rootfs_unpack.sh "${{ env.ROOTFS_PATH }}"

      - name: Prepare artifact directory
        run: sudo mkdir -p "${{ env.ARTIFACT_DIR }}"

      - name: Run stage 10
        env:
          END_STAGE: "10"
          ARTIFACT_DIR: ${{ env.ARTIFACT_DIR }}
        run: sudo -E bash build.sh --non-interactive

      - name: Upload final artifact (.iso or .img)
        uses: actions/upload-artifact@v4
        with:
          name: gentooha-${{ inputs.platform }}-${{ inputs.flavor }}
          path: |
            ${{ env.ARTIFACT_DIR }}/gentooha-${{ inputs.platform }}-${{ inputs.flavor }}.*
          if-no-files-found: error
          retention-days: 14

  # ── Cleanup: delete all intermediate rootfs artifacts ────────────────────
  # Runs after stage10 (including on failure) to reclaim storage space.
  # The final gentooha-* artifact is never touched; only rootfs-* are removed.
  cleanup:
    name: "Cleanup intermediate rootfs artifacts"
    needs: [stage10]
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Delete intermediate rootfs artifacts
        run: |
          echo "Listing rootfs-* artifacts for run ${{ github.run_id }}"
          artifact_ids=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --paginate \
            --jq '.artifacts[] | select(.name | startswith("rootfs-")) | .id')

          if [[ -z "$artifact_ids" ]]; then
            echo "No intermediate rootfs artifacts found; nothing to delete."
            exit 0
          fi

          failed=0
          echo "$artifact_ids" | while read -r id; do
            echo "Deleting artifact id=$id"
            if ! gh api --method DELETE "repos/${{ github.repository }}/actions/artifacts/$id"; then
              echo "WARNING: failed to delete artifact id=$id" >&2
              failed=1
            fi
          done
          if [[ "$failed" -eq 0 ]]; then
            echo "Cleanup complete."
          else
            echo "Cleanup finished with errors; some artifacts may remain." >&2
            exit 1
          fi
