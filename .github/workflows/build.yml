name: Build GentooHA

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Target platform
        required: true
        default: x64
        type: choice
        options: [x64, pi3, pi4, pizero2, bbb, pbv2]
      flavor:
        description: Build flavor
        required: true
        default: debug
        type: choice
        options: [live, installer, debug]
      reuse_previous_artifacts:
        description: Reuse matching stage artifacts from prior completed runs when available
        required: false
        default: false
        type: boolean
      reuse_binpkg_bundle:
        description: Seed /var/cache/binpkgs from a prior run before emerge-heavy stages
        required: false
        default: false
        type: boolean
      reuse_source_run_id:
        description: Specific workflow run ID to reuse artifacts from
        required: false
        default: ""
        type: string

  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      flavor:
        required: true
        type: string
      start_stage:
        required: false
        type: string
        default: "1"
      clean_state:
        required: false
        type: string
        default: "false"
      reuse_previous_artifacts:
        required: false
        type: boolean
        default: false
      reuse_binpkg_bundle:
        required: false
        type: boolean
        default: false
      reuse_source_run_id:
        required: false
        type: string
        default: ""

permissions:
  contents: read
  actions: write

env:
  PLATFORM: ${{ inputs.platform }}
  FLAVOR: ${{ inputs.flavor }}
  REUSE_PREVIOUS_ARTIFACTS: ${{ inputs.reuse_previous_artifacts }}
  REUSE_BINPKG_BUNDLE: ${{ inputs.reuse_binpkg_bundle }}
  REUSE_SOURCE_RUN_ID: ${{ inputs.reuse_source_run_id }}

jobs:
  stage1:
    name: stage1 - base bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Reuse stage1 rootfs from prior run
        if: ${{ inputs.reuse_previous_artifacts }}
        id: reuse_stage1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/github/restore_run_artifact.sh \
            --artifact-name "rootfs-${PLATFORM}-${FLAVOR}-stage1" \
            --download-dir /tmp \
            --workflow-name "${{ github.workflow }}" \
            --branch "${{ github.ref_name }}" \
            --run-id "$REUSE_SOURCE_RUN_ID"

      - name: Install runner dependencies
        if: ${{ steps.reuse_stage1.outputs.cache_hit != 'true' }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q git rsync zstd qemu-utils

      - name: Clone HA org repos
        if: ${{ steps.reuse_stage1.outputs.cache_hit != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHALLOW=true RESUME=true INCLUDE_ARCHIVED=false bash scripts/repos/clone_home_assistant_org.sh

      - name: Run stage1 only
        if: ${{ steps.reuse_stage1.outputs.cache_hit != 'true' }}
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" START_STAGE=1 END_STAGE=1 CLEAN_STATE=true bash build.sh --non-interactive

      - name: Pack rootfs after stage1
        if: ${{ steps.reuse_stage1.outputs.cache_hit != 'true' }}
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_pack.sh /tmp/rootfs-stage1.tar.zst

      - name: Upload rootfs stage1 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage1
          path: |
            /tmp/rootfs-stage1.tar.zst
            /tmp/rootfs_meta.txt
          if-no-files-found: error
          retention-days: 14
          overwrite: true

  stage2:
    name: stage2 - base system config
    runs-on: ubuntu-latest
    needs: stage1
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Reuse stage2 rootfs from prior run
        if: ${{ inputs.reuse_previous_artifacts }}
        id: reuse_stage2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/github/restore_run_artifact.sh \
            --artifact-name "rootfs-${PLATFORM}-${FLAVOR}-stage2" \
            --download-dir /tmp \
            --workflow-name "${{ github.workflow }}" \
            --branch "${{ github.ref_name }}" \
            --run-id "$REUSE_SOURCE_RUN_ID"

      - name: Install runner dependencies
        if: ${{ steps.reuse_stage2.outputs.cache_hit != 'true' }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q git rsync zstd qemu-utils

      - name: Clone HA org repos
        if: ${{ steps.reuse_stage2.outputs.cache_hit != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHALLOW=true RESUME=true INCLUDE_ARCHIVED=false bash scripts/repos/clone_home_assistant_org.sh

      - name: Download rootfs from stage1
        if: ${{ steps.reuse_stage2.outputs.cache_hit != 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage1
          path: /tmp

      - name: Restore rootfs from stage1
        if: ${{ steps.reuse_stage2.outputs.cache_hit != 'true' }}
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_unpack.sh /tmp/rootfs-stage1.tar.zst

      - name: Run stage2 only
        if: ${{ steps.reuse_stage2.outputs.cache_hit != 'true' }}
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" START_STAGE=2 END_STAGE=2 CLEAN_STATE=false bash build.sh --non-interactive

      - name: Pack rootfs after stage2
        if: ${{ steps.reuse_stage2.outputs.cache_hit != 'true' }}
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_pack.sh /tmp/rootfs-stage2.tar.zst

      - name: Upload rootfs stage2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage2
          path: |
            /tmp/rootfs-stage2.tar.zst
            /tmp/rootfs_meta.txt
          if-no-files-found: error
          retention-days: 14
          overwrite: true

  stage3:
    name: stage3 - world update and core tools
    runs-on: ubuntu-latest
    needs: stage2
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Reuse stage3 rootfs from prior run
        if: ${{ inputs.reuse_previous_artifacts }}
        id: reuse_stage3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/github/restore_run_artifact.sh \
            --artifact-name "rootfs-${PLATFORM}-${FLAVOR}-stage3" \
            --download-dir /tmp \
            --workflow-name "${{ github.workflow }}" \
            --branch "${{ github.ref_name }}" \
            --run-id "$REUSE_SOURCE_RUN_ID"

      - name: Install runner dependencies
        if: ${{ steps.reuse_stage3.outputs.cache_hit != 'true' }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q git rsync zstd qemu-utils

      - name: Clone HA org repos
        if: ${{ steps.reuse_stage3.outputs.cache_hit != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHALLOW=true RESUME=true INCLUDE_ARCHIVED=false bash scripts/repos/clone_home_assistant_org.sh

      - name: Download rootfs from stage2
        if: ${{ steps.reuse_stage3.outputs.cache_hit != 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage2
          path: /tmp

      - name: Restore rootfs from stage2
        if: ${{ steps.reuse_stage3.outputs.cache_hit != 'true' }}
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_unpack.sh /tmp/rootfs-stage2.tar.zst

      - name: Seed binpkg cache from prior run
        if: ${{ inputs.reuse_binpkg_bundle && steps.reuse_stage3.outputs.cache_hit != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf /tmp/reuse-binpkgs
          mkdir -p /tmp/reuse-binpkgs
          bash scripts/github/restore_run_artifact.sh \
            --artifact-name "gentooha-binpkgs-${PLATFORM}-${FLAVOR}" \
            --download-dir /tmp/reuse-binpkgs \
            --workflow-name "${{ github.workflow }}" \
            --branch "${{ github.ref_name }}" \
            --run-id "$REUSE_SOURCE_RUN_ID"
          if [[ -f /tmp/reuse-binpkgs/binpkgs-${PLATFORM}-${FLAVOR}.tar.gz ]]; then
            sudo mkdir -p /mnt/gentoo/var/cache
            sudo tar -C /mnt/gentoo/var/cache -xzf /tmp/reuse-binpkgs/binpkgs-${PLATFORM}-${FLAVOR}.tar.gz
          fi

      - name: Run stage3 only
        if: ${{ steps.reuse_stage3.outputs.cache_hit != 'true' }}
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" START_STAGE=3 END_STAGE=3 CLEAN_STATE=false bash build.sh --non-interactive

      - name: Pack rootfs after stage3
        if: ${{ steps.reuse_stage3.outputs.cache_hit != 'true' }}
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_pack.sh /tmp/rootfs-stage3.tar.zst

      - name: Upload rootfs stage3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage3
          path: |
            /tmp/rootfs-stage3.tar.zst
            /tmp/rootfs_meta.txt
          if-no-files-found: error
          retention-days: 14
          overwrite: true

  stage4:
    name: stage4 - supervised prerequisites
    runs-on: ubuntu-latest
    needs: stage3
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Reuse stage4 rootfs from prior run
        if: ${{ inputs.reuse_previous_artifacts }}
        id: reuse_stage4
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/github/restore_run_artifact.sh \
            --artifact-name "rootfs-${PLATFORM}-${FLAVOR}-stage4" \
            --download-dir /tmp \
            --workflow-name "${{ github.workflow }}" \
            --branch "${{ github.ref_name }}" \
            --run-id "$REUSE_SOURCE_RUN_ID"

      - name: Install runner dependencies
        if: ${{ steps.reuse_stage4.outputs.cache_hit != 'true' }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q git rsync zstd qemu-utils

      - name: Clone HA org repos
        if: ${{ steps.reuse_stage4.outputs.cache_hit != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHALLOW=true RESUME=true INCLUDE_ARCHIVED=false bash scripts/repos/clone_home_assistant_org.sh

      - name: Download rootfs from stage3
        if: ${{ steps.reuse_stage4.outputs.cache_hit != 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage3
          path: /tmp

      - name: Restore rootfs from stage3
        if: ${{ steps.reuse_stage4.outputs.cache_hit != 'true' }}
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_unpack.sh /tmp/rootfs-stage3.tar.zst

      - name: Seed binpkg cache from prior run
        if: ${{ inputs.reuse_binpkg_bundle && steps.reuse_stage4.outputs.cache_hit != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf /tmp/reuse-binpkgs
          mkdir -p /tmp/reuse-binpkgs
          bash scripts/github/restore_run_artifact.sh \
            --artifact-name "gentooha-binpkgs-${PLATFORM}-${FLAVOR}" \
            --download-dir /tmp/reuse-binpkgs \
            --workflow-name "${{ github.workflow }}" \
            --branch "${{ github.ref_name }}" \
            --run-id "$REUSE_SOURCE_RUN_ID"
          if [[ -f /tmp/reuse-binpkgs/binpkgs-${PLATFORM}-${FLAVOR}.tar.gz ]]; then
            sudo mkdir -p /mnt/gentoo/var/cache
            sudo tar -C /mnt/gentoo/var/cache -xzf /tmp/reuse-binpkgs/binpkgs-${PLATFORM}-${FLAVOR}.tar.gz
          fi

      - name: Run stage4 only
        if: ${{ steps.reuse_stage4.outputs.cache_hit != 'true' }}
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" START_STAGE=4 END_STAGE=4 CLEAN_STATE=false bash build.sh --non-interactive

      - name: Pack rootfs after stage4
        if: ${{ steps.reuse_stage4.outputs.cache_hit != 'true' }}
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_pack.sh /tmp/rootfs-stage4.tar.zst

      - name: Upload rootfs stage4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage4
          path: |
            /tmp/rootfs-stage4.tar.zst
            /tmp/rootfs_meta.txt
          if-no-files-found: error
          retention-days: 14
          overwrite: true

  stage5:
    name: stage5 - supervisor+agent packages
    runs-on: ubuntu-latest
    needs: stage4
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Reuse stage5 rootfs from prior run
        if: ${{ inputs.reuse_previous_artifacts }}
        id: reuse_stage5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/github/restore_run_artifact.sh \
            --artifact-name "rootfs-${PLATFORM}-${FLAVOR}-stage5" \
            --download-dir /tmp \
            --workflow-name "${{ github.workflow }}" \
            --branch "${{ github.ref_name }}" \
            --run-id "$REUSE_SOURCE_RUN_ID"

      - name: Install runner dependencies
        if: ${{ steps.reuse_stage5.outputs.cache_hit != 'true' }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q git rsync zstd qemu-utils

      - name: Clone HA org repos
        if: ${{ steps.reuse_stage5.outputs.cache_hit != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHALLOW=true RESUME=true INCLUDE_ARCHIVED=false bash scripts/repos/clone_home_assistant_org.sh

      - name: Download rootfs from stage4
        if: ${{ steps.reuse_stage5.outputs.cache_hit != 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage4
          path: /tmp

      - name: Restore rootfs from stage4
        if: ${{ steps.reuse_stage5.outputs.cache_hit != 'true' }}
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_unpack.sh /tmp/rootfs-stage4.tar.zst

      - name: Seed binpkg cache from prior run
        if: ${{ inputs.reuse_binpkg_bundle && steps.reuse_stage5.outputs.cache_hit != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf /tmp/reuse-binpkgs
          mkdir -p /tmp/reuse-binpkgs
          bash scripts/github/restore_run_artifact.sh \
            --artifact-name "gentooha-binpkgs-${PLATFORM}-${FLAVOR}" \
            --download-dir /tmp/reuse-binpkgs \
            --workflow-name "${{ github.workflow }}" \
            --branch "${{ github.ref_name }}" \
            --run-id "$REUSE_SOURCE_RUN_ID"
          if [[ -f /tmp/reuse-binpkgs/binpkgs-${PLATFORM}-${FLAVOR}.tar.gz ]]; then
            sudo mkdir -p /mnt/gentoo/var/cache
            sudo tar -C /mnt/gentoo/var/cache -xzf /tmp/reuse-binpkgs/binpkgs-${PLATFORM}-${FLAVOR}.tar.gz
          fi

      - name: Run stage5 only
        if: ${{ steps.reuse_stage5.outputs.cache_hit != 'true' }}
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" START_STAGE=5 END_STAGE=5 CLEAN_STATE=false bash build.sh --non-interactive

      - name: Pack rootfs after stage5
        if: ${{ steps.reuse_stage5.outputs.cache_hit != 'true' }}
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_pack.sh /tmp/rootfs-stage5.tar.zst

      - name: Upload rootfs stage5 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage5
          path: |
            /tmp/rootfs-stage5.tar.zst
            /tmp/rootfs_meta.txt
          if-no-files-found: error
          retention-days: 14
          overwrite: true

  stage6:
    name: stage6 - kernel build
    runs-on: ubuntu-latest
    needs: stage5
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Reuse stage6 rootfs from prior run
        if: ${{ inputs.reuse_previous_artifacts }}
        id: reuse_stage6
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/github/restore_run_artifact.sh \
            --artifact-name "rootfs-${PLATFORM}-${FLAVOR}-stage6" \
            --download-dir /tmp \
            --workflow-name "${{ github.workflow }}" \
            --branch "${{ github.ref_name }}" \
            --run-id "$REUSE_SOURCE_RUN_ID"

      - name: Reuse stage6 kernel bundle from prior run
        if: ${{ inputs.reuse_previous_artifacts && steps.reuse_stage6.outputs.cache_hit == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/github/restore_run_artifact.sh \
            --artifact-name "kernel-${PLATFORM}-${FLAVOR}-stage6" \
            --download-dir /tmp \
            --workflow-name "${{ github.workflow }}" \
            --branch "${{ github.ref_name }}" \
            --run-id "${{ steps.reuse_stage6.outputs.source_run_id }}"

      - name: Install runner dependencies
        if: ${{ steps.reuse_stage6.outputs.cache_hit != 'true' }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q git rsync zstd qemu-utils \
            gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Clone HA org repos
        if: ${{ steps.reuse_stage6.outputs.cache_hit != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHALLOW=true RESUME=true INCLUDE_ARCHIVED=false bash scripts/repos/clone_home_assistant_org.sh

      - name: Download rootfs from stage5
        if: ${{ steps.reuse_stage6.outputs.cache_hit != 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage5
          path: /tmp

      - name: Restore rootfs from stage5
        if: ${{ steps.reuse_stage6.outputs.cache_hit != 'true' }}
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_unpack.sh /tmp/rootfs-stage5.tar.zst

      - name: Seed binpkg cache from prior run
        if: ${{ inputs.reuse_binpkg_bundle && steps.reuse_stage6.outputs.cache_hit != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf /tmp/reuse-binpkgs
          mkdir -p /tmp/reuse-binpkgs
          bash scripts/github/restore_run_artifact.sh \
            --artifact-name "gentooha-binpkgs-${PLATFORM}-${FLAVOR}" \
            --download-dir /tmp/reuse-binpkgs \
            --workflow-name "${{ github.workflow }}" \
            --branch "${{ github.ref_name }}" \
            --run-id "$REUSE_SOURCE_RUN_ID"
          if [[ -f /tmp/reuse-binpkgs/binpkgs-${PLATFORM}-${FLAVOR}.tar.gz ]]; then
            sudo mkdir -p /mnt/gentoo/var/cache
            sudo tar -C /mnt/gentoo/var/cache -xzf /tmp/reuse-binpkgs/binpkgs-${PLATFORM}-${FLAVOR}.tar.gz
          fi

      - name: Run stage6 only
        if: ${{ steps.reuse_stage6.outputs.cache_hit != 'true' }}
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" START_STAGE=6 END_STAGE=6 CLEAN_STATE=false bash build.sh --non-interactive

      - name: Pack rootfs after stage6
        if: ${{ steps.reuse_stage6.outputs.cache_hit != 'true' }}
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_pack.sh /tmp/rootfs-stage6.tar.zst

      - name: Pack kernel bundle after stage6
        if: ${{ steps.reuse_stage6.outputs.cache_hit != 'true' }}
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/kernel_bundle_pack.sh /tmp/kernel-${PLATFORM}-${FLAVOR}-stage6.tar.zst

      - name: Upload rootfs stage6 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage6
          path: |
            /tmp/rootfs-stage6.tar.zst
            /tmp/rootfs_meta.txt
          if-no-files-found: error
          retention-days: 14
          overwrite: true

      - name: Upload kernel bundle stage6 artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ inputs.platform }}-${{ inputs.flavor }}-stage6
          path: |
            /tmp/kernel-${{ inputs.platform }}-${{ inputs.flavor }}-stage6.tar.zst
            /tmp/kernel_bundle_meta.txt
          if-no-files-found: warn
          retention-days: 14
          overwrite: true

  stage7:
    name: stage7 - kernel install and boot config
    runs-on: ubuntu-latest
    needs: stage6
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Reuse stage7 rootfs from prior run
        if: ${{ inputs.reuse_previous_artifacts }}
        id: reuse_stage7
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/github/restore_run_artifact.sh \
            --artifact-name "rootfs-${PLATFORM}-${FLAVOR}-stage7" \
            --download-dir /tmp \
            --workflow-name "${{ github.workflow }}" \
            --branch "${{ github.ref_name }}" \
            --run-id "$REUSE_SOURCE_RUN_ID"

      - name: Install runner dependencies
        if: ${{ steps.reuse_stage7.outputs.cache_hit != 'true' }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q git rsync zstd qemu-utils

      - name: Clone HA org repos
        if: ${{ steps.reuse_stage7.outputs.cache_hit != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHALLOW=true RESUME=true INCLUDE_ARCHIVED=false bash scripts/repos/clone_home_assistant_org.sh

      - name: Download rootfs from stage6
        if: ${{ steps.reuse_stage7.outputs.cache_hit != 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage6
          path: /tmp

      - name: Restore rootfs from stage6
        if: ${{ steps.reuse_stage7.outputs.cache_hit != 'true' }}
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_unpack.sh /tmp/rootfs-stage6.tar.zst

      - name: Seed binpkg cache from prior run
        if: ${{ inputs.reuse_binpkg_bundle && steps.reuse_stage7.outputs.cache_hit != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf /tmp/reuse-binpkgs
          mkdir -p /tmp/reuse-binpkgs
          bash scripts/github/restore_run_artifact.sh \
            --artifact-name "gentooha-binpkgs-${PLATFORM}-${FLAVOR}" \
            --download-dir /tmp/reuse-binpkgs \
            --workflow-name "${{ github.workflow }}" \
            --branch "${{ github.ref_name }}" \
            --run-id "$REUSE_SOURCE_RUN_ID"
          if [[ -f /tmp/reuse-binpkgs/binpkgs-${PLATFORM}-${FLAVOR}.tar.gz ]]; then
            sudo mkdir -p /mnt/gentoo/var/cache
            sudo tar -C /mnt/gentoo/var/cache -xzf /tmp/reuse-binpkgs/binpkgs-${PLATFORM}-${FLAVOR}.tar.gz
          fi

