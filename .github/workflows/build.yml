            /tmp/rootfs_meta.txt
          if-no-files-found: error
          retention-days: 14
          overwrite: true

  stage6:
    name: stage6 - kernel build
    runs-on: ubuntu-latest
    needs: stage5
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install runner dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q git rsync zstd qemu-utils \
            gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Clone HA org repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHALLOW=true RESUME=true INCLUDE_ARCHIVED=false bash scripts/repos/clone_home_assistant_org.sh

      - name: Download rootfs from stage5
        uses: actions/download-artifact@v4.1.3
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage5
          path: /tmp

      - name: Restore rootfs from stage5
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_unpack.sh /tmp/rootfs-stage5.tar.zst

      - name: Run stage6 only
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" START_STAGE=6 END_STAGE=6 CLEAN_STATE=false bash build.sh --non-interactive

      - name: Pack rootfs after stage6
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_pack.sh /tmp/rootfs-stage6.tar.zst

