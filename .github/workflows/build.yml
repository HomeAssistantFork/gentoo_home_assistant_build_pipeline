        run: |
          SHALLOW=true RESUME=true INCLUDE_ARCHIVED=false bash scripts/repos/clone_home_assistant_org.sh

      - name: Download rootfs from stage6
        uses: actions/download-artifact@v4.1.3
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage6
          path: /tmp

      - name: Restore rootfs from stage6
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_unpack.sh /tmp/rootfs-stage6.tar.zst

      - name: Run stage7 only
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" START_STAGE=7 END_STAGE=7 CLEAN_STATE=false bash build.sh --non-interactive

      - name: Pack rootfs after stage7
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_pack.sh /tmp/rootfs-stage7.tar.zst

      - name: Upload rootfs stage7 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage7
          path: |
            /tmp/rootfs-stage7.tar.zst
            /tmp/rootfs_meta.txt
          if-no-files-found: error
          retention-days: 14
          overwrite: true

  stage8:
    name: stage8 - HA OS layering
    runs-on: ubuntu-latest
    needs: stage7
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install runner dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q git rsync zstd qemu-utils

      - name: Clone HA org repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHALLOW=true RESUME=true INCLUDE_ARCHIVED=false bash scripts/repos/clone_home_assistant_org.sh

      - name: Download rootfs from stage7
        uses: actions/download-artifact@v4.1.3
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage7
          path: /tmp

      - name: Restore rootfs from stage7
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_unpack.sh /tmp/rootfs-stage7.tar.zst

      - name: Run stage8 only
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" START_STAGE=8 END_STAGE=8 CLEAN_STATE=false bash build.sh --non-interactive

      - name: Pack rootfs after stage8
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_pack.sh /tmp/rootfs-stage8.tar.zst

      - name: Upload rootfs stage8 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage8
          path: |
            /tmp/rootfs-stage8.tar.zst
            /tmp/rootfs_meta.txt
          if-no-files-found: error
          retention-days: 14
          overwrite: true

  stage9:
    name: stage9 - apparmor userspace
    runs-on: ubuntu-latest
    needs: stage8
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install runner dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q git rsync zstd qemu-utils

      - name: Clone HA org repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHALLOW=true RESUME=true INCLUDE_ARCHIVED=false bash scripts/repos/clone_home_assistant_org.sh

      - name: Download rootfs from stage8
        uses: actions/download-artifact@v4.1.3
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage8
          path: /tmp

      - name: Restore rootfs from stage8
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_unpack.sh /tmp/rootfs-stage8.tar.zst

      - name: Run stage9 only
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" START_STAGE=9 END_STAGE=9 CLEAN_STATE=false bash build.sh --non-interactive

      - name: Pack rootfs after stage9
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_pack.sh /tmp/rootfs-stage9.tar.zst

      - name: Upload rootfs stage9 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage9
          path: |
            /tmp/rootfs-stage9.tar.zst
            /tmp/rootfs_meta.txt
          if-no-files-found: error
          retention-days: 14
          overwrite: true

  stage10:
    name: stage10 - internal cleanup
    runs-on: ubuntu-latest
    needs: stage9
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install runner dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q git rsync zstd qemu-utils

      - name: Clone HA org repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHALLOW=true RESUME=true INCLUDE_ARCHIVED=false bash scripts/repos/clone_home_assistant_org.sh

      - name: Download rootfs from stage9
        uses: actions/download-artifact@v4.1.3
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage9
          path: /tmp

      - name: Restore rootfs from stage9
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_unpack.sh /tmp/rootfs-stage9.tar.zst

      - name: Run stage10 only
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" START_STAGE=10 END_STAGE=10 CLEAN_STATE=false bash build.sh --non-interactive

      - name: Pack rootfs after stage10
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_pack.sh /tmp/rootfs-stage10.tar.zst

      - name: Upload rootfs stage10 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage10
          path: |
            /tmp/rootfs-stage10.tar.zst
            /tmp/rootfs_meta.txt
          if-no-files-found: error
          retention-days: 14
          overwrite: true

  stage11:
    name: stage11 - external artifact build
    runs-on: ubuntu-latest
    needs: stage10
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install runner dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q git rsync zstd qemu-utils \
            xorriso grub-pc-bin grub-efi-amd64-bin mtools squashfs-tools \
            dosfstools parted kpartx syslinux-common debootstrap

      - name: Clone HA org repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHALLOW=true RESUME=true INCLUDE_ARCHIVED=false bash scripts/repos/clone_home_assistant_org.sh

      - name: Download rootfs from stage10
        uses: actions/download-artifact@v4.1.3
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage10
          path: /tmp

      - name: Restore rootfs from stage10
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_unpack.sh /tmp/rootfs-stage10.tar.zst

      - name: Run stage11 only
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" START_STAGE=11 END_STAGE=11 CLEAN_STATE=false bash build.sh --non-interactive

      - name: Pack rootfs after stage11
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_pack.sh /tmp/rootfs-stage11.tar.zst

      - name: Upload rootfs stage11 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage11
          path: |
            /tmp/rootfs-stage11.tar.zst
            /tmp/rootfs_meta.txt
          if-no-files-found: error
          retention-days: 14
          overwrite: true

  stage12:
    name: stage12 - generate binary package cache
    runs-on: ubuntu-latest
    needs: stage11
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install runner dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q git rsync zstd qemu-utils

      - name: Clone HA org repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHALLOW=true RESUME=true INCLUDE_ARCHIVED=false bash scripts/repos/clone_home_assistant_org.sh

      - name: Download rootfs from stage11
        uses: actions/download-artifact@v4.1.3
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage11
          path: /tmp

      - name: Restore rootfs from stage11
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_unpack.sh /tmp/rootfs-stage11.tar.zst

      - name: Run stage12 only
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" START_STAGE=12 END_STAGE=12 CLEAN_STATE=false bash build.sh --non-interactive

      - name: Pack rootfs after stage12
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_pack.sh /tmp/rootfs-stage12.tar.zst

      - name: Archive stage12 binpkgs
        run: |
          sudo bash -lc 'set -euo pipefail
          if [[ -d /mnt/gentoo/var/cache/binpkgs ]]; then
            tar -C /mnt/gentoo/var/cache -czf /tmp/binpkgs-${PLATFORM}-${FLAVOR}.tar.gz binpkgs
          else
            echo "No /mnt/gentoo/var/cache/binpkgs directory found; skipping binpkg archive"
          fi'

      - name: Upload rootfs stage12 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage12
          path: |
            /tmp/rootfs-stage12.tar.zst
            /tmp/rootfs_meta.txt
          if-no-files-found: error
          retention-days: 14
          overwrite: true

      - name: Upload binpkg cache bundle
        uses: actions/upload-artifact@v4
        with:
          name: gentooha-binpkgs-${{ inputs.platform }}-${{ inputs.flavor }}
          path: |
            /tmp/binpkgs-${{ inputs.platform }}-${{ inputs.flavor }}.tar.gz
          if-no-files-found: warn
          retention-days: 14
          overwrite: true

  stage13:
    name: stage13 - manifest + publish artifacts
    runs-on: ubuntu-latest
    needs: stage12
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install runner dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q git rsync zstd qemu-utils

      - name: Clone HA org repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHALLOW=true RESUME=true INCLUDE_ARCHIVED=false bash scripts/repos/clone_home_assistant_org.sh

      - name: Download rootfs from stage12
        uses: actions/download-artifact@v4.1.3
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage12
          path: /tmp

      - name: Restore rootfs from stage12
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" bash scripts/gentoo/rootfs_unpack.sh /tmp/rootfs-stage12.tar.zst

      - name: Run stage13 only
        run: |
          sudo env PLATFORM="$PLATFORM" FLAVOR="$FLAVOR" START_STAGE=13 END_STAGE=13 CLEAN_STATE=false bash build.sh --non-interactive

      - name: Upload final build artifact
        uses: actions/upload-artifact@v4
        with:
          name: gentooha-${{ inputs.platform }}-${{ inputs.flavor }}
          path: |
            /var/lib/ha-gentoo-hybrid/artifacts/gentooha-${{ inputs.platform }}-${{ inputs.flavor }}.*
          if-no-files-found: error
          retention-days: 14
          overwrite: true

      - name: Upload stage13 manifest bundle
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.platform }}-${{ inputs.flavor }}-stage13
          path: |
            /var/lib/ha-gentoo-hybrid/artifacts/gentooha-${{ inputs.platform }}-${{ inputs.flavor }}.manifest.txt
          if-no-files-found: warn
          retention-days: 14
          overwrite: true
