name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Shell-script syntax validation ──────────────────────────────────────────
  validate-scripts:
    name: Validate Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Shell script syntax check
        run: |
          find scripts -name "*.sh" -print0 | xargs -0 -n1 bash -n
          bash -n build.sh
          bash -n configure.sh

  # ── Artifact build smoke-test (x64-live, self-hosted preferred) ─────────────
  # This job mirrors build.yml but is scoped to x64-live as a PR gate.
  # It will be expanded once the full validation suite is implemented.
  artifact-smoke-test:
    name: Artifact Smoke Test (x64-live)
    runs-on: [self-hosted, linux, x64]
    continue-on-error: true          # self-hosted may be offline; fallback below
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone HA org repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHALLOW=true RESUME=true INCLUDE_ARCHIVED=false \
            bash scripts/repos/clone_home_assistant_org.sh

      - name: Run build
        env:
          PLATFORM: x64
          FLAVOR: live
          START_STAGE: "1"
          CLEAN_STATE: "false"
        run: |
          sudo bash build.sh --non-interactive

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number }}-x64-live
          path: /var/lib/ha-gentoo-hybrid/artifacts/gentooha-x64-live.*
          if-no-files-found: error
          retention-days: 7

  artifact-smoke-test-fallback:
    name: Artifact Smoke Test (x64-live, github-hosted)
    needs: artifact-smoke-test
    if: needs.artifact-smoke-test.result != 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone HA org repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHALLOW=true RESUME=true INCLUDE_ARCHIVED=false \
            bash scripts/repos/clone_home_assistant_org.sh

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            xorriso grub-pc-bin grub-efi-amd64-bin mtools squashfs-tools \
            dosfstools parted kpartx rsync \
            debootstrap schroot

      - name: Run build
        env:
          PLATFORM: x64
          FLAVOR: live
          START_STAGE: "1"
          CLEAN_STATE: "false"
        run: |
          sudo bash build.sh --non-interactive

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number }}-x64-live-fallback ────────────────
  # Configure this job's name ("PR Gate") as the required check in
  # Settings → Branches → Branch protection rules for `main`.
  # Run `.github/workflows/setup-branch-protection.yml` once to automate that.
  pr-gate:
    name: PR Gate
    needs: [validate-scripts, artifact-smoke-test, artifact-smoke-test-fallback]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate required checks
        run: |
          validate="${{ needs.validate-scripts.result }}"
          smoke="${{ needs.artifact-smoke-test.result }}"
          fallback="${{ needs.artifact-smoke-test-fallback.result }}"

          echo "validate-scripts             : $validate"
          echo "artifact-smoke-test          : $smoke"
          echo "artifact-smoke-test-fallback : $fallback"

          # Script validation must always pass
          if [[ "$validate" != "success" ]]; then
            echo "::error::validate-scripts failed"
            exit 1
          fi

          # At least one of the build jobs must have succeeded.
          # "skipped" is acceptable for either leg when the other leg succeeds
          # (e.g. fallback=skipped when self-hosted already passed, or smoke=skipped
          # when the job was omitted for some other reason and fallback succeeded).
          smoke_ok="$([[ "$smoke"    == "success" || "$smoke"    == "skipped" ]] && echo yes || echo no)"
          fallback_ok="$([[ "$fallback" == "success" || "$fallback" == "skipped" ]] && echo yes || echo no)"
          if [[ "$smoke_ok" == "no" && "$fallback_ok" == "no" ]]; then
            echo "::error::Both artifact build jobs failed"
            exit 1
          fi

          echo "All PR checks passed — merge is permitted"
