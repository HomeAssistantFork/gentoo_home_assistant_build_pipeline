name: Trusted Local Release

on:
  push:
    tags:
      - 'v*'
      - 'release-*'
  workflow_dispatch:
    inputs:
      platform:
        description: Target platform
        required: true
        default: x64
        type: choice
        options: [x64, pi3, pi4, pizero2, bbb, pbv2]
      flavor:
        description: Build flavor
        required: true
        default: debug
        type: choice
        options: [live, installer, debug]
      x64_formats:
        description: X64 artifact formats (space/comma separated)
        required: false
        default: vdi iso img
      publish_release:
        description: Publish build artifacts to a GitHub Release
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  actions: write

env:
  PLATFORM: ${{ github.event_name == 'workflow_dispatch' && inputs.platform || 'x64' }}
  FLAVOR: ${{ github.event_name == 'workflow_dispatch' && inputs.flavor || 'debug' }}
  X64_ARTIFACT_FORMATS: ${{ github.event_name == 'workflow_dispatch' && inputs.x64_formats || 'vdi iso img' }}
  BUILD_UML_KERNEL: false

jobs:
  build-local:
    name: Build on local PC
    runs-on: [self-hosted, windows, x64]
    timeout-minutes: 480
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify WSL Debian is available
        shell: pwsh
        run: |
          wsl -d Debian -u root -- bash -lc 'command -v bash >/dev/null && echo WSL_OK'

      - name: Run local build
        shell: pwsh
        run: |
          $workspace = "${{ github.workspace }}"
          $wslWorkspace = (wsl -d Debian -- wslpath "$workspace").Trim()
          if ([string]::IsNullOrWhiteSpace($wslWorkspace)) { throw "Unable to translate workspace path to WSL" }

          wsl -d Debian -u root -- bash -lc @"
          set -euo pipefail
          cd '$wslWorkspace'
          CLEAN_STATE=true START_STAGE=1 END_STAGE=13 PLATFORM='$env:PLATFORM' FLAVOR='$env:FLAVOR' X64_ARTIFACT_FORMATS='$env:X64_ARTIFACT_FORMATS' BUILD_UML_KERNEL='$env:BUILD_UML_KERNEL' ARTIFACT_ACTION=y USE_BINPKG=true bash build.sh --non-interactive
          "@

      - name: Stage artifacts for release
        shell: pwsh
        run: |
          $workspace = "${{ github.workspace }}"
          $staging = Join-Path $workspace ".trusted-release-artifacts"

          if (Test-Path $staging) {
            Remove-Item -Recurse -Force $staging
          }
          New-Item -ItemType Directory -Force -Path $staging | Out-Null

          $wslStaging = (wsl -d Debian -- wslpath "$staging").Trim()
          if ([string]::IsNullOrWhiteSpace($wslStaging)) { throw "Unable to translate staging path to WSL" }

          wsl -d Debian -u root -- bash -lc @"
          set -euo pipefail
          staging='$wslStaging'
          mkdir -p "\$staging"
          cp -f /var/lib/ha-gentoo-hybrid/artifacts/gentooha-'$env:PLATFORM'-'$env:FLAVOR'.* "\$staging"/
          if [[ -d /mnt/gentoo/var/cache/binpkgs ]]; then
            tar -C /mnt/gentoo/var/cache -czf "\$staging/binpkgs-'$env:PLATFORM'-'$env:FLAVOR'.tar.gz" binpkgs
            tar --zstd -C /mnt/gentoo/var/cache -cf "\$staging/gentooha-binhost-'$env:PLATFORM'-'$env:FLAVOR'.tar.zst" binpkgs
          fi
          "@

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trusted-local-${{ env.PLATFORM }}-${{ env.FLAVOR }}
          path: |
            .trusted-release-artifacts/gentooha-${{ env.PLATFORM }}-${{ env.FLAVOR }}.*
            .trusted-release-artifacts/binpkgs-${{ env.PLATFORM }}-${{ env.FLAVOR }}.tar.gz
            .trusted-release-artifacts/gentooha-binhost-${{ env.PLATFORM }}-${{ env.FLAVOR }}.tar.zst
          if-no-files-found: error
          retention-days: 14
          overwrite: true

  publish-release:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs: build-local
    if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release) }}
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: trusted-local-${{ env.PLATFORM }}-${{ env.FLAVOR }}
          path: /tmp/release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('build-{0}', github.run_number) }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('GentooHA build {0}', github.run_number) }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          generate_release_notes: true
          files: |
            /tmp/release-assets/gentooha-${{ env.PLATFORM }}-${{ env.FLAVOR }}.*
            /tmp/release-assets/binpkgs-${{ env.PLATFORM }}-${{ env.FLAVOR }}.tar.gz
            /tmp/release-assets/gentooha-binhost-${{ env.PLATFORM }}-${{ env.FLAVOR }}.tar.zst